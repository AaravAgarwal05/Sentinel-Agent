# Alembic configuration for the Sentinel Agent.
#
# The ``sqlalchemy.url`` is intentionally left blank here. The migration
# environment in ``alembic/env.py`` overrides it from
# ``Settings().storage.database_url`` at runtime, so a single source of
# truth (the application configuration) drives both the application
# and the migrations.

[alembic]
# path to migration scripts.
script_location = %(here)s/alembic

# sys.path is prepended with the project root so ``alembic/env.py``
# can import ``agent.config.settings``.
prepend_sys_path = .

# database URL -- overridden in env.py from application settings.
sqlalchemy.url =

path_separator = os


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
