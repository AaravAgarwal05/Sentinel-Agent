apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sentinel-agent.fullname" . }}-role
  labels:
    {{- include "sentinel-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, events, namespaces, nodes]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets]
    verbs: [get, list, watch]
