apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sentinel-agent.fullname" . }}-rolebinding
  labels:
    {{- include "sentinel-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sentinel-agent.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: sentinel-agent
    namespace: {{ .Release.Namespace }}
