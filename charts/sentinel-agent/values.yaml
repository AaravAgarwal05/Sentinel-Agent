image:
  repository: sentinel-agent
  tag: latest
  pullPolicy: IfNotPresent

agent:
  clusterName: default
  environment: development

sentinel:
  apiUrl: https://api.sentinel.example.com
  registrationToken: ""
  mockMode: true

heartbeat:
  intervalSeconds: 30

storage:
  databaseUrl: sqlite:////data/sentinel_agent.db

collection:
  enabled: true
  maxEvents: 20
  transport:
    enabled: true
    baseUrl: http://172.18.0.3:30586
    mockMode: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
